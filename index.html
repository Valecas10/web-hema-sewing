<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hema Sewing - Piezas con alma</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Scripts externos -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Inicialización EmailJS -->
    <script>
        (function () {
            emailjs.init('GtTEbj4qoWdwpMU81');
        })();
    </script>
</head>

<body>

    <!-- ==================== INICIO ==================== -->
    <section id="inicio">
        <div class="site-container">

            <header class="main-header">
                <div class="logo">
                    <h1>HEMA</h1>
                    <span class="sub-logo-sewing">SEWING</span>
                    <span class="sub-logo-alma">handmade with love</span>
                </div>

                <div class="logo-img">
                    <a href="index.html">
                        <img src="assets/Logo-crudo.png" alt="HEMA" class="logo-img">
                    </a>
                </div>

                <nav class="nav-menu">
                    <button class="btn-main-action btn-nav" onclick="mostrarVista('seguimiento')">
                        Seguimiento
                    </button>

                    <button class="menu-toggle" id="mobile-menu">
                        ☰
                    </button>
                </nav>
            </header>

            <main class="hero-magazine">

                <aside class="side-text left">
                    <div class="promo-box">
                        <h2>TOTE BAGS</h2>
                        <p>100% ARTESANALES</p>
                    </div>
                </aside>

                <section class="central-gallery">
                    <div class="photo-frame frame-1">
                        <div class="border-overlay"></div>
                        <img src="assets/fotos-inicio/Modelo-1.jpg">
                    </div>

                    <div class="photo-frame frame-2">
                        <div class="border-overlay"></div>
                        <img src="assets/fotos-inicio/Modelo-2.jpg">
                    </div>

                    <div class="photo-frame frame-3">
                        <div class="border-overlay"></div>
                        <img src="assets/fotos-inicio/Modelo-3.png">
                    </div>
                </section>

                <aside class="side-text right">
                    <div class="promo-box">
                        <h2>PIEZAS</h2>
                        <p>CON ALMA</p>
                    </div>
                </aside>

            </main>

            <div class="cta-container">
                <button class="btn-main-action" onclick="mostrarVista('armar')">
                    EMPEZAR MI PEDIDO
                </button>
            </div>

        </div>
    </section>

    <!-- ==================== COMPRA ==================== -->
    <section id="compra" class="oculto">

        <div class="site-container">

            <header class="main-header">
                <button class="btn-volver" onclick="mostrarVista('inicio')">← Volver</button>

                <div class="logo-img">
                    <a href="#inicio">
                        <img src="assets/Logo-crudo.png" alt="HEMA" class="logo-img">
                    </a>
                </div>

                <div class="space"></div>
            </header>
    

            <!-- Paso 1 -->
            <section class="paso">
                <h2>Paso 1: Elige tu Tela</h2>
                <div id="contenedor-telas" class="grid-seleccion"></div>
                <input type="hidden" id="tela-seleccionada">
            </section>

            <section id="seccion-personalizacion" class="paso">
                <h3>Paso 2: Tipo de Personalización</h3>
                <div id="contenedor-personalizacion" class="grid-seleccion">
                </div>
                <input type="hidden" id="personalizacion-seleccionada" value="sin-nada">
            </section>

            <div class="checkout-actions">
                <button id="btn-agregar-final" class="btn-main-action">
                Agregar al Carrito
                </button>
            </div>
            
            <div id="cart-container" class="cart-container">
                <div id="cart-window" class="cart-window oculto">
                    <div class="cart-header">
                        <span>Tu Pedido</span>
                        <button id="close-cart" class="btn-close-hema">&times;</button>
                    </div>
                    <div id="cart-items" class="cart-items">
                        <p class="empty-msg">El carrito está vacío</p>
                    </div>
                    <div class="cart-footer">
                        <div class="cart-total">Total: $<span id="total-price">0</span></div>
                        <button id="btn-checkout" class="btn-pay" onclick="mostrarVista('datos-comprador')">
                            Pagar ahora
                        </button>
                    </div>
                </div>

                <div id="cart-button" class="floating-cart">
                    <span class="cart-icon"><img src="assets/carrito-blanco.png" alt="carrito"></span>
                    <span id="cart-count">0</span>
                    
                </div> 
            </div>
        </div>    
    </section>
        
    <section id="datos-comprador" class="oculto">

        <div class="site-container">


            <header class="main-header">
                <button class="btn-volver" onclick="mostrarVista('inicio')">← Volver</button>

                <div class="logo-img">
                    <a href="#inicio">
                        <img src="assets/Logo-crudo.png" alt="HEMA" class="logo-img">
                    </a>
                </div>

                <div class="space"></div>
            </header>

            <!-- Paso 2 -->
            <section class="paso">
                <h3>Paso 2: Tus Datos de Contacto</h3>

                <div id="datos-cliente" class="formulario-grid">

                    <div class="campo">
                        <label for="nombre-cliente">Tu nombre completo:</label>
                        <input type="text" id="nombre-cliente" required>
                    </div>

                    <div class="campo">
                        <label for="email-cliente">Tu email:</label>
                        <input type="email" id="email-cliente" required>
                    </div>

                    <div class="campo">
                        <label for="telefono-cliente">Tu número telefónico:</label>
                        <input type="tel" id="telefono-cliente" required>
                    </div>

                </div>
        </div>
    </section>
    
    <section id="dirreccion-comprador" class="oculto">
        <!-- Paso 3 -->
        <section id="seccion-direccion" class="paso">
            <h3>Paso 3: Datos de Entrega</h3>

            <div class="formulario-grid">

                <div class="campo">
                    <label>Provincia:</label>
                    <select id="select-provincia">
                        <option value="">Seleccioná tu provincia</option>
                        <option>Buenos Aires</option>
                        <option>CABA</option>
                        <option>Catamarca</option>
                        <option>Chaco</option>
                        <option>Chubut</option>
                        <option>Córdoba</option>
                        <option>Corrientes</option>
                        <option>Entre Ríos</option>
                        <option>Formosa</option>
                        <option>Jujuy</option>
                        <option>La Pampa</option>
                        <option>La Rioja</option>
                        <option>Mendoza</option>
                        <option>Misiones</option>
                        <option>Neuquén</option>
                        <option>Río Negro</option>
                        <option>Salta</option>
                        <option>San Juan</option>
                        <option>San Luis</option>
                        <option>Santa Cruz</option>
                        <option>Santa Fe</option>
                        <option>Santiago del Estero</option>
                        <option>Tierra del Fuego</option>
                        <option>Tucumán</option>
                    </select>
                </div>

                <div class="campo" style="position: relative;">
                    <label>Ciudad / Localidad:</label>
                    <input type="text" id="input-ciudad" placeholder="Ej: Tandil" autocomplete="off">
                    <div id="sugerencias-ciudad" class="sugerencias-estilo"></div>
                </div>

                <div class="campo" style="position: relative;">
                    <label>Calle y Altura:</label>
                    <input type="text" id="input-calle" placeholder="Ej: Av. Colón 1234">
                    <div id="contenedor-sugerencias" class="sugerencias-estilo"></div>
                </div>

                <div class="campo">
                    <label>Datos extra (Opcional):</label>
                    <input type="text" id="dato-extra" placeholder="Ej: Piso/Departamento">
                </div>

            </div>

            <div id="mapa-libre"></div>
        </section>

        <!-- Acciones -->
        <div style="margin-top: 30px; padding-bottom: 50px;">
            <button id="boton-test">Calcular Presupuesto</button>

            <button id="boton-enviar-pedido" style="
                background-color: #a0816c;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            ">
                Confirmar Pedido
            </button>
        </div>

    </section>

    <!-- ================== SEGUIMIENTO ================== -->
    <section id="seguimiento" class="oculto">
        <div class="site-container">

            <header class="main-header">
                <button class="btn-volver" onclick="mostrarVista('inicio')">← Volver</button>

                <div class="logo-img">
                    <a href="#inicio">
                        <img src="assets/Logo-crudo.png" alt="HEMA" class="logo-img">
                    </a>
                </div>

                <div class="space"></div>
            </header>

            <main class="central-gallery">
                <h2>Seguimiento de pedido</h2>

                <div class="busqueda-seguimiento">
                    <input type="text" id="input-busqueda-tracking" placeholder="Ingresá tu código">
                    <button onclick="consultarEstadoPedido()">Buscar</button>
                </div>

                <div id="resultado-busqueda" class="oculto">
                    <p class="status" id="estado-pedido"></p>
                </div>

            </main>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
