<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script type="text/javascript">
        (function(){
        // SUSTITUYE "TU_PUBLIC_KEY" por la que te da EmailJS en su panel (Account -> API Keys)
        emailjs.init('GtTEbj4qoWdwpMU81');
    })();
    </script>
</head>
<body>
    <h1> Hema Sewing </h1>
    <button id="boton-test">Calcular Presupuesto</button>

    <link rel="stylesheet" href="style.css">
    <h2>Paso 1: Elige tu Tela</h2>
<div id="contenedor-telas" class="grid-seleccion">
    <div class="card-opcion" data-valor="lino">
        <img src="assets/Lino.webp" alt="Tela Lino">
        <span>Lino Premium</span>
    </div>
    <div class="card-opcion" data-valor="algodon">
        <img src="assets/Algodon.jpeg" alt="Tela Algodón">
        <span>Algodón 100%</span>
    </div>
</div>

<h2>Paso 2: Elige el Estilo de Bordado</h2>
<div id="contenedor-bordados" class="grid-seleccion">
    <div class="card-opcion" data-valor="Retrato">
        <img src="assets/Retrato.jpg" alt="Retrato">
        <span>Retrato</span>
    </div>
    <div class="card-opcion" data-valor="Emojis">
        <img src="assets/Emojis.jpg" alt="Emojis">
        <span>Emojis</span>
    </div>
    <div class="card-opcion" data-valor="Letras">
        <img src="assets/Letras.jpg" alt="Letras">
        <span>Letras</span>
    </div>
</div>


<div id="personalizacion-extra" class="oculto">    
    <div class="campo">
        <label for="letras-bordado">Escribi tu frase aquí:</label>
        <input type="text" id="letras-bordado" required>
    </div>
 </div>
<hr>

<h3>Paso 4: Datos de Envío</h3>
<div id="datos-cliente">
    <div class="campo">
        <label for="nombre-cliente">Tu nombre completo:</label>
        <input type="text" id="nombre-cliente" required>
    </div>
    <div>
        <label for="email-cliente">Tu email:</label>
        <input type="email" id="email-cliente" required>
    </div>
    <div>
        <label for="telefono-cliente">Tu numero telefonico:</label>
        <input type="tel" id="telefono-cliente" required>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div id="seccion-direccion">
    <h3>Paso 5: Datos de Entrega</h3>
    
    <div class="campo">
        <label>Provincia:</label>
        <select id="select-provincia">
            <option value="">Seleccioná tu provincia</option>
            <option value="Buenos Aires">Buenos Aires</option>
            <option value="CABA">CABA</option>
            <option value="Córdoba">Córdoba</option>
            <option value="Santa Fe">Santa Fe</option>
            </select>
    </div>

    <div class="campo">
        <label>Ciudad / Localidad:</label>
        <input type="text" id="input-ciudad" placeholder="Ej: Tandil">
    </div>

    <div class="campo">
        <label>Calle y Altura:</label>
        <input type="text" id="input-calle" placeholder="Ej: Av. Colón 1234">
        <div id="contenedor-sugerencias" class="sugerencias-estilo"></div>
    </div>

    <div id="mapa-libre" style="height: 250px; width: 100%; border-radius: 8px; margin-top: 10px; border: 2px solid #a0816c;"></div>
</div>

<button id="boton-enviar-pedido">Confirmar Pedido</button>

<input type="hidden" id="tela-seleccionada">
<input type="hidden" id="bordado-seleccionado">
<script src="script.js"></script>
</body>
</html>
